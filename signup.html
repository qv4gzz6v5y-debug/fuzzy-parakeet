<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>회원가입</title>
  <link rel="stylesheet" href="portfolio.html/style.css">
</head>
<body>
  <h2>회원가입</h2>
  <form id="signup-form">
    <input id="signup-email" type="email" placeholder="이메일" required />
    <input id="signup-username" placeholder="아이디" required />
    <input id="signup-password" type="password" placeholder="비밀번호 (6자리 이상)" required />
    <button type="submit">회원가입</button>
  </form>
  <script type="module" src="js/app.js"></script>
</body>
</html>
